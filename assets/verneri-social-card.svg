<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="card-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6f8fc" />
      <stop offset="1" stop-color="#e5f3fb" />
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#0f1f33" flood-opacity="0.14" />
    </filter>
    <clipPath id="portrait-clip">
      <rect x="824" y="82" width="292" height="466" rx="24" />
    </clipPath>
    <clipPath id="avatar-clip">
      <rect x="88" y="70" width="74" height="74" rx="18" />
    </clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#card-bg)" />
  <circle cx="1110" cy="-45" r="330" fill="#38bdf8" opacity="0.08" />
  <circle cx="42" cy="650" r="260" fill="#6366f1" opacity="0.05" />

  <image
    href="verneri-flatcoat-avatar.webp"
    x="88"
    y="70"
    width="74"
    height="74"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#avatar-clip)"
  />

  <rect x="88" y="182" width="64" height="5" rx="2.5" fill="#0369a1" />
  <text x="88" y="278" fill="#0f1f33" font-family="Arial, Helvetica, sans-serif" font-size="66" font-weight="700">Verneri Sirva</text>
  <text x="88" y="337" fill="#0369a1" font-family="Arial, Helvetica, sans-serif" font-size="27" font-weight="700" letter-spacing="1.4">AI SYSTEMS DEVELOPER</text>
  <text x="88" y="397" fill="#5b6b7f" font-family="Arial, Helvetica, sans-serif" font-size="27">AI systems · research · backend engineering</text>
  <text x="88" y="445" fill="#5b6b7f" font-family="Arial, Helvetica, sans-serif" font-size="24">MSc Economics · MSc Computer Science (soon)</text>
  <text x="88" y="528" fill="#0f1f33" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700">Consultant at HiQ</text>
  <text x="88" y="566" fill="#5b6b7f" font-family="Arial, Helvetica, sans-serif" font-size="19">vernerisirva.github.io</text>

  <rect x="810" y="68" width="320" height="494" rx="30" fill="#fff" filter="url(#shadow)" />
  <image
    href="verneri-profile.jpg"
    x="824"
    y="82"
    width="292"
    height="466"
    preserveAspectRatio="xMidYMid slice"
    clip-path="url(#portrait-clip)"
  />
</svg>
