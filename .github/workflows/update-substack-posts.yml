name: Update Substack posts

on:
  schedule:
    - cron: "20 7 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Refresh latest Substack posts
        run: |
          curl -fsSL https://verneri.substack.com/feed -o /tmp/substack-feed.xml
          python3 scripts/update_substack_posts.py --feed-file /tmp/substack-feed.xml

      - name: Verify site
        run: node --test tests/site.test.mjs

      - name: Commit changed posts
        run: |
          if git diff --quiet; then
            echo "No Substack post changes."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "content: update latest Substack posts"
          git push
